services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.api
    environment:
      NODE_ENV: production
      PORT: 4101
      CORS_ORIGIN: http://localhost:4100
    ports:
      - "4101:4101"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun --eval \"fetch('http://127.0.0.1:4101/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env.web
    environment:
      NODE_ENV: production
      PORT: 4100
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: http://localhost:4100
    ports:
      - "4100:4100"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4100').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
